# =============================================================================
# Custom Datadog SNMP Profile: Cisco StackWise (Catalyst 9300 / 3850)
# Profile Name: cisco-catalyst-stackwise.yaml
# Place in: /etc/datadog-agent/conf.d/snmp.d/profiles/
# =============================================================================
# OID names verified against CISCO-STACKWISE-MIB source:
#   https://cric.grenoble.cnrs.fr/Administrateurs/Outils/MIBS/?module=CISCO-STACKWISE-MIB
#   https://mibbrowser.online/mibdb_search.php?mib=CISCO-STACKWISE-MIB
# =============================================================================

extends:
  - _base.yaml
  - _generic-if.yaml

# Remove sysobjectid block if using explicit `profile:` in conf.yaml
# (recommended to avoid conflict with Datadog's default cisco-3850.yaml)
sysobjectid:
  - 1.3.6.1.4.1.9.1.2862   # C9300-24T
  - 1.3.6.1.4.1.9.1.2863   # C9300-48T
  - 1.3.6.1.4.1.9.1.2864   # C9300-24P
  - 1.3.6.1.4.1.9.1.2865   # C9300-48P
  - 1.3.6.1.4.1.9.1.2872   # C9300-24UX
  - 1.3.6.1.4.1.9.1.2876   # C9300-48UXM
  - 1.3.6.1.4.1.9.1.2253   # WS-C3850-24T
  - 1.3.6.1.4.1.9.1.2255   # WS-C3850-48T
  - 1.3.6.1.4.1.9.1.2257   # WS-C3850-24P
  - 1.3.6.1.4.1.9.1.2259   # WS-C3850-48P
  - 1.3.6.1.4.1.9.1.2260   # WS-C3850-48F

metadata:
  device:
    fields:
      vendor:
        value: cisco
      type:
        value: switch

# =============================================================================
# METRICS
# Datadog metric name = snmp.<name> where <name> is the value in `name:` field
# All OID-to-name mappings verified against actual MIB source
# =============================================================================

metrics:

  # ---------------------------------------------------------------------------
  # CISCO-STACKWISE-MIB :: cswGlobals (scalar)
  # OID base: 1.3.6.1.4.1.9.9.500.1.1
  # ---------------------------------------------------------------------------

  # cswRingRedundant — TruthValue: true(1)=ring intact, false(2)=ring broken
  # Datadog metric: snmp.cswRingRedundant
  - MIB: CISCO-STACKWISE-MIB
    symbol:
      OID: 1.3.6.1.4.1.9.9.500.1.1.3
      name: cswRingRedundant

  # cswMaxSwitchNum — max switches supported in this stack (informational)
  # Datadog metric: snmp.cswMaxSwitchNum
  - MIB: CISCO-STACKWISE-MIB
    symbol:
      OID: 1.3.6.1.4.1.9.9.500.1.1.1
      name: cswMaxSwitchNum

  # ---------------------------------------------------------------------------
  # CISCO-STACKWISE-MIB :: cswSwitchInfoTable
  # OID base: 1.3.6.1.4.1.9.9.500.1.2.1
  #
  # VERIFIED column assignments (from MIB source):
  #   .1.1.1  cswSwitchNumCurrent    Integer32  — table INDEX (used as tag)
  #   .1.1.2  cswSwitchNumNextReload Integer32
  #   .1.1.3  cswSwitchRole          INTEGER    — master(1), member(2), notMember(3)
  #   .1.1.4  cswSwitchSwPriority    Integer32  — software priority
  #   .1.1.5  cswSwitchHwPriority    Integer32  — hardware priority
  #   .1.1.6  cswSwitchState         INTEGER    — waiting(1), progressing(2), added(3),
  #                                               ready(4), sdmMismatch(5), verMismatch(6),
  #                                               featureMismatch(7), newMasterInit(8),
  #                                               provisioned(9), invalid(10), removed(11)
  #   .1.1.7  cswSwitchMacAddress    MacAddress — OctetString (tag only)
  #   .1.1.8  cswSwitchSoftwareImage DisplayString — OctetString (tag only)
  # ---------------------------------------------------------------------------

  - MIB: CISCO-STACKWISE-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.500.1.2.1
      name: cswSwitchInfoTable
    symbols:
      # Datadog metric: snmp.cswSwitchRole
      - OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.3
        name: cswSwitchRole
      # Datadog metric: snmp.cswSwitchSwPriority
      - OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.4
        name: cswSwitchSwPriority
      # Datadog metric: snmp.cswSwitchHwPriority
      - OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.5
        name: cswSwitchHwPriority
      # Datadog metric: snmp.cswSwitchState  (alert when != 4)
      - OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.6
        name: cswSwitchState
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.1
          name: cswSwitchNumCurrent
        tag: stack_member
      - column:
          OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.7
          name: cswSwitchMacAddress
          format: mac_address
        tag: stack_member_mac
      - column:
          OID: 1.3.6.1.4.1.9.9.500.1.2.1.1.8
          name: cswSwitchSoftwareImage
        tag: sw_image

  # ---------------------------------------------------------------------------
  # CISCO-STACKWISE-MIB :: cswStackPortInfoTable
  # OID base: 1.3.6.1.4.1.9.9.500.1.2.2
  #
  # VERIFIED column assignments:
  #   .1.1  cswStackPortOperStatus  INTEGER — up(1), down(2), forcedDown(3)
  #   .1.2  cswStackPortNeighbor    Integer32 — entPhysicalIndex of neighbor
  #
  # Table index = [entPhysicalIndex, stackPortIndex]
  # Datadog metric: snmp.cswStackPortOperStatus{stack_member:N, stack_port:N}
  # ---------------------------------------------------------------------------

  - MIB: CISCO-STACKWISE-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.500.1.2.2
      name: cswStackPortInfoTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.500.1.2.2.1.1
        name: cswStackPortOperStatus
    metric_tags:
      - index: 1
        tag: stack_member
      - index: 2
        tag: stack_port

  # ---------------------------------------------------------------------------
  # CISCO-ENTITY-SENSOR-MIB :: entSensorValueTable
  # OID base: 1.3.6.1.4.1.9.9.91.1.1.1
  #
  # Datadog metrics:
  #   snmp.entSensorValue{sensor_type:celsius|rpm|...}
  #   snmp.entSensorStatus{sensor_type:...}
  # ---------------------------------------------------------------------------

  - MIB: CISCO-ENTITY-SENSOR-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.91.1.1.1
      name: entSensorValueTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.4
        name: entSensorValue
      - OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.5
        name: entSensorStatus
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.1
          name: entSensorType
          mapping:
            1: voltageAC
            2: voltageDC
            3: amperes
            4: watts
            5: hertz
            6: celsius
            7: percentRH
            8: rpm
            9: cmm
            10: truthvalue
            14: dBm
        tag: sensor_type

  # ---------------------------------------------------------------------------
  # CISCO-PROCESS-MIB :: cpmCPUTotalTable
  # OID base: 1.3.6.1.4.1.9.9.109.1.1.1
  #
  # Datadog metrics:
  #   snmp.cpmCPUTotal5sec{cpu_index:N}
  #   snmp.cpmCPUTotal1min{cpu_index:N}
  #   snmp.cpmCPUTotal5min{cpu_index:N}
  # ---------------------------------------------------------------------------

  - MIB: CISCO-PROCESS-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.109.1.1.1
      name: cpmCPUTotalTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.3
        name: cpmCPUTotal5sec
        metric_type: gauge
      - OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.4
        name: cpmCPUTotal1min
        metric_type: gauge
      - OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.5
        name: cpmCPUTotal5min
        metric_type: gauge
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.9.9.109.1.1.1.1.2
          name: cpmCPUTotalPhysicalIndex
        tag: cpu_index

  # ---------------------------------------------------------------------------
  # CISCO-MEMORY-POOL-MIB :: ciscoMemoryPoolTable
  # OID base: 1.3.6.1.4.1.9.9.48.1.1
  #
  # Datadog metrics:
  #   snmp.ciscoMemoryPoolUsed{memory_pool:Processor|I/O|...}
  #   snmp.ciscoMemoryPoolFree{memory_pool:...}
  # ---------------------------------------------------------------------------

  - MIB: CISCO-MEMORY-POOL-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.48.1.1
      name: ciscoMemoryPoolTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.48.1.1.1.5
        name: ciscoMemoryPoolUsed
      - OID: 1.3.6.1.4.1.9.9.48.1.1.1.6
        name: ciscoMemoryPoolFree
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.9.9.48.1.1.1.3
          name: ciscoMemoryPoolName
        tag: memory_pool

# =============================================================================
# DEVICE-LEVEL TAGS (applied to all metrics)
# =============================================================================

metric_tags:
  - OID: 1.3.6.1.2.1.1.5.0
    symbol: sysName
    tag: snmp_host
  - OID: 1.3.6.1.2.1.1.1.0
    symbol: sysDescr
    tag: device_description

# =============================================================================
# COMPLETE METRIC NAME REFERENCE
# =============================================================================
#
#  METRIC NAME                   TYPE   TAGS
#  ──────────────────────────────────────────────────────────────────────────
#  snmp.cswRingRedundant         gauge  snmp_host
#  snmp.cswMaxSwitchNum          gauge  snmp_host
#  snmp.cswSwitchRole            gauge  stack_member, stack_member_mac, sw_image
#  snmp.cswSwitchSwPriority      gauge  stack_member, stack_member_mac, sw_image
#  snmp.cswSwitchHwPriority      gauge  stack_member, stack_member_mac, sw_image
#  snmp.cswSwitchState           gauge  stack_member, stack_member_mac, sw_image
#  snmp.cswStackPortOperStatus   gauge  stack_member, stack_port
#  snmp.entSensorValue           gauge  sensor_type (celsius|rpm|watts|...)
#  snmp.entSensorStatus          gauge  sensor_type
#  snmp.cpmCPUTotal5sec          gauge  cpu_index
#  snmp.cpmCPUTotal1min          gauge  cpu_index
#  snmp.cpmCPUTotal5min          gauge  cpu_index
#  snmp.ciscoMemoryPoolUsed      gauge  memory_pool
#  snmp.ciscoMemoryPoolFree      gauge  memory_pool
#
# =============================================================================
# MONITOR QUERIES
# =============================================================================
#
# 1. Stack member not ready:
#    max:snmp.cswSwitchState{*} by {stack_member} != 4
#
# 2. Stack port down:
#    max:snmp.cswStackPortOperStatus{*} by {stack_member,stack_port} > 1
#
# 3. Ring broken:
#    min:snmp.cswRingRedundant{*} < 1
#
# 4. CPU spike:
#    avg:snmp.cpmCPUTotal5min{*} by {cpu_index} > 85
#
# 5. Memory saturation:
#    (snmp.ciscoMemoryPoolUsed / (snmp.ciscoMemoryPoolUsed + snmp.ciscoMemoryPoolFree)) * 100 > 80
#
# =============================================================================
# conf.yaml USAGE
# =============================================================================
#
# instances:
#   - ip_address: <ACTIVE_SWITCH_IP>
#     community_string: <community>
#     profile: cisco-catalyst-stackwise
#     tags:
#       - "site:dc1"
#       - "stack:core-stack-01"
#
# =============================================================================