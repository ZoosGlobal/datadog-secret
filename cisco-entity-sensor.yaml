# =============================================================================
# Datadog SNMP Profile: CISCO-ENTITY-SENSOR-MIB + ENTITY-MIB
# Tested against: Cisco Catalyst 9300 / 3850 Stack (4-member)
#
# Confirmed sensor_id → sensor name mapping (from entPhysicalName walk):
#   x012 = Switch x - Inlet Temp Sensor
#   x013 = Switch x - Outlet Temp Sensor
#   x014 = Switch x - HotSpot Temp Sensor
#   x116 = GigabitEthernetx/1/4 Module Temperature Sensor
#   (x = stack member number: 1, 2, 3, 4)
#
# Sensor types observed on device:
#   4  = voltsDC   (mV  → divide by 1000 for V)
#   5  = amperes   (mA  → divide by 1000 for A)
#   6  = watts     (mW  → divide by 1000 for W)
#   8  = celsius   (units, no conversion needed)
#   10 = rpm       (units, no conversion needed)
#   14 = dBm       (Cisco extension, SFP optical power)
#
# PLACEMENT:
#   /etc/datadog-agent/conf.d/snmp.d/profiles/cisco-entity-sensor.yaml
#
# USAGE in snmp.d/conf.yaml:
#   instances:
#     - ip_address: 10.13.240.33
#       profile: cisco-entity-sensor
#       community_string: <community>      # SNMPv2
#       # -- OR SNMPv3 --
#       # user: EXL-NMS-AUTH-INT
#       # authKey: <AUTH_PASSWORD>
#       # privKey: <PRIV_PASSWORD>
#       # authProtocol: SHA
#       # privProtocol: AES
# =============================================================================

name: cisco-entity-sensor

sysobjectid:
  - 1.3.6.1.4.1.9.1.516    # Cisco Catalyst 3750 stack
  - 1.3.6.1.4.1.9.1.1641   # Cisco Catalyst 3850-48P
  - 1.3.6.1.4.1.9.1.1642   # Cisco Catalyst 3850-24P
  - 1.3.6.1.4.1.9.1.1643   # Cisco Catalyst 3850-48
  - 1.3.6.1.4.1.9.1.1644   # Cisco Catalyst 3850-24
  - 1.3.6.1.4.1.9.1.2499   # Cisco Catalyst 9404R
  - 1.3.6.1.4.1.9.1.2500   # Cisco Catalyst 9407R
  - 1.3.6.1.4.1.9.1.2501   # Cisco Catalyst 9410R
  - 1.3.6.1.4.1.9.1.2494   # Cisco Catalyst 9300 stack
  - 1.3.6.1.4.1.9.1.2593   # Cisco Catalyst 9500 stack

metrics:

  # ---------------------------------------------------------------------------
  # TABLE: entSensorValueTable (CISCO-ENTITY-SENSOR-MIB)
  # OID:   1.3.6.1.4.1.9.9.91.1.1.1
  #
  # Primary sensor reading table. Indexed by entPhysicalIndex.
  # Cross-references entPhysicalTable (ENTITY-MIB) for human-readable names.
  #
  # Metrics produced:
  #   snmp.entSensorValue  - raw sensor reading
  #   snmp.entSensorStatus - 1=ok, 2=unavailable, 3=nonoperational
  #
  # Key tags:
  #   sensor_name        - e.g. "Switch 1 - HotSpot Temp Sensor"
  #   sensor_type        - e.g. celsius, rpm, watts, voltsDC, amperes
  #   sensor_scale       - e.g. milli, units  (needed to decode raw value)
  #   sensor_description - component description from ENTITY-MIB
  # ---------------------------------------------------------------------------
  - MIB: CISCO-ENTITY-SENSOR-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.91.1.1.1
      name: entSensorValueTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.4
        name: entSensorValue
      - OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.5
        name: entSensorStatus
    metric_tags:
      # Human-readable sensor name from ENTITY-MIB
      # e.g. "Switch 1 - Inlet Temp Sensor", "PS1 FAN", "Switch 2 - HotSpot Temp Sensor"
      - tag: sensor_name
        MIB: ENTITY-MIB
        symbol:
          OID: 1.3.6.1.2.1.47.1.1.1.1.7
          name: entPhysicalName
        table: entPhysicalTable

      # Physical description of component
      # e.g. "Cisco C9300 Switch System", "GigabitEthernet module"
      - tag: sensor_description
        MIB: ENTITY-MIB
        symbol:
          OID: 1.3.6.1.2.1.47.1.1.1.1.2
          name: entPhysicalDescr
        table: entPhysicalTable

      # Sensor data type (mapped to readable label)
      # Observed on Cisco 9300/3850: 4=voltsDC, 5=amperes, 6=watts,
      #                              8=celsius, 10=rpm, 14=dBm (SFP)
      - tag: sensor_type
        symbol:
          OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.1
          name: entSensorType
        mapping:
          1: other
          2: unknown
          3: voltsAC
          4: voltsDC
          5: amperes
          6: watts
          7: hertz
          8: celsius
          9: percentRH
          10: rpm
          11: cmm
          12: truthvalue
          14: dBm

      # Scale exponent - needed to convert raw value to real units
      # Most common on 9300/3850:
      #   8=milli  → raw / 1000  (voltage mV, current mA, power mW)
      #   9=units  → raw as-is   (temperature °C, fan RPM)
      - tag: sensor_scale
        symbol:
          OID: 1.3.6.1.4.1.9.9.91.1.1.1.1.2
          name: entSensorScale
        mapping:
          6: nano
          7: micro
          8: milli
          9: units
          10: kilo
          11: mega
          12: giga

  # ---------------------------------------------------------------------------
  # TABLE: entSensorThresholdTable (CISCO-ENTITY-SENSOR-MIB)
  # OID:   1.3.6.1.4.1.9.9.91.1.2.1
  #
  # Threshold breach status per sensor. Useful for alerting on pre-configured
  # device thresholds without having to define your own values.
  #
  # Metric produced:
  #   snmp.entSensorThresholdEvaluation - 1=breached, 2=ok
  #
  # Key tags:
  #   sensor_name        - same as above, links to sensor
  #   threshold_severity - minor, major, critical
  #   threshold_relation - lessThan, greaterThan, etc.
  # ---------------------------------------------------------------------------
  - MIB: CISCO-ENTITY-SENSOR-MIB
    table:
      OID: 1.3.6.1.4.1.9.9.91.1.2.1
      name: entSensorThresholdTable
    symbols:
      - OID: 1.3.6.1.4.1.9.9.91.1.2.1.1.5
        name: entSensorThresholdEvaluation
    metric_tags:
      - tag: sensor_name
        MIB: ENTITY-MIB
        symbol:
          OID: 1.3.6.1.2.1.47.1.1.1.1.7
          name: entPhysicalName
        table: entPhysicalTable

      # 1=other, 10=minor, 20=major, 30=critical
      - tag: threshold_severity
        symbol:
          OID: 1.3.6.1.4.1.9.9.91.1.2.1.1.2
          name: entSensorThresholdSeverity
        mapping:
          1: other
          10: minor
          20: major
          30: critical

      # Comparison operator used to evaluate breach
      - tag: threshold_relation
        symbol:
          OID: 1.3.6.1.4.1.9.9.91.1.2.1.1.3
          name: entSensorThresholdRelation
        mapping:
          1: lessThan
          2: lessOrEqual
          3: greaterThan
          4: greaterOrEqual
          5: equalTo
          6: notEqualTo

# =============================================================================
# DATADOG MONITOR EXAMPLES (copy into Monitors → New Monitor → Metric)
#
# 1. Temperature alert (any switch, any sensor > 70°C):
#    max:snmp.entSensorValue{sensor_type:celsius} by {sensor_name,snmp_device} > 70
#
# 2. HotSpot temp alert specifically (sensor_id pattern x014):
#    max:snmp.entSensorValue{sensor_type:celsius,sensor_name:*hotspot*} by {snmp_device} > 75
#
# 3. Fan failure (RPM drops below 1000):
#    min:snmp.entSensorValue{sensor_type:rpm} by {sensor_name,snmp_device} < 1000
#
# 4. PSU input power (mW → W via formula /1000):
#    avg:snmp.entSensorValue{sensor_type:watts} by {sensor_name,snmp_device} / 1000
#
# 5. Threshold breach (device-defined):
#    max:snmp.entSensorThresholdEvaluation{threshold_severity:critical} by {sensor_name,snmp_device} > 0
#
# SENSOR VALUE DECODING:
#   Temperature : sensor_scale=units  → value as-is  (30 = 30°C)
#   Voltage     : sensor_scale=milli  → value / 1000  (56313 = 56.313V)
#   Current     : sensor_scale=milli  → value / 1000  (250 = 0.25A)
#   Power       : sensor_scale=milli  → value / 1000  (42000 = 42W)
#   Fan RPM     : sensor_scale=units  → value as-is  (4032 = 4032 RPM)
# =============================================================================